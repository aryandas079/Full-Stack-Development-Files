<!doctype html> 
<html lang="en"> 
    <head> 
        <title>oldagram</title> 
        <meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1"> 
        <link rel="stylesheet" href="style.css"> 
        <link rel="icon" href="https://www.svgrepo.com/show/452229/instagram-1.svg"> 
    </head> 
    <body>
        <header> 
            <div> <img src="images/logo.png" id="oldagram-logo" alt="Oldagram logo" /> </div>
            <div> 
                <img src="images/icon-heart.png" alt="notifications-icon" id="notification-icon" /> 
                <img src="https://cdn-icons-png.flaticon.com/128/9293/9293682.png" alt="messenger-icon" id="messenger-icon" /> 
            </div>
         </header> 

         <main> 
            <section class="story-section"> 
                <div> 
                    <img src="images/user-avatar.png" id="imag1" class="avatar-users" alt="this is a user avatar" /> 
                    <label for="img1">@elonmusk</label>
                </div>
                <div> 
                    <img src="images/avatar-courbet.jpg" id="imag2" class="avatar-users" alt="this is a user avatar" />  
                    <label for="img2">@courbet</label>
                </div>
                <div> 
                    <img src="images/avatar-ducreux.jpg" id="imag3" class="avatar-users" alt="this is a user avatar" />  
                    <label for="img3">@ducreux</label>
                </div>
                <div> 
                    <img src="images/avatar-vangogh.jpg" id="imag4" class="avatar-users" alt="this is a user avatar" /> 
                    <label for="img4">@vangogh</label>
                </div> 
            </section>  

            <section class="posts"> 
                <div class="post1">
                    <div class="post-header"> 
                        <div> 
                            <img src="images/avatar-vangogh.jpg" alt="avatar of the user" id="user1" class="user-avatar"/> 
                            <div id="post-user-name"> 
                                <span class="user-name">Vincent van Gogh<br><span class="location">Zudert, Netherlands</span></span>
                            </div> 
                        </div> 
                        <div> 
                            <img class="kebab-menu" src="https://img.icons8.com/external-solid-kawalan-studio/24/external-kebab-menu-user-interface-solid-kawalan-studio.png" />
                        </div>
                    </div> 
                    <img src="images/post-vangogh.jpg" class="post-images" alt="an image post of vangogh" /> 
                    <div class="engagement"> 
                        <img src="images/icon-heart.png" class="eng-icons" alt="like"/> 
                        <img src="images/icon-comment.png" class="eng-icons" alt="comment"/> 
                        <img src="images/icon-dm.png" class="eng-icons" alt="direct-message"/>  
                    </div> 
                    <p>21,492 likes</p> 
                    <p class="post-title">@vangogh I've just drawn my selfie!!!</p> 
                </div> 
                <nav> 
                    <img src="https://cdn-icons-png.flaticon.com/128/5948/5948524.png" class="nav-icons" alt="home-icon" />
                    <img src="https://cdn-icons-png.flaticon.com/128/11820/11820168.png" class="nav-icons" alt="reels-icon" />
                    <img src="https://cdn-icons-png.flaticon.com/128/3161/3161837.png" class="nav-icons" alt="create-icon" />
                    <img src="https://cdn-icons-png.flaticon.com/128/5948/5948534.png" class="nav-icons" alt="search-icon" />
                    <img src="https://cdn-icons-png.flaticon.com/128/456/456283.png" class="nav-icons" alt="profile-icon" />
                </nav>
            </section>

         </main> 
    </body>
</html>
