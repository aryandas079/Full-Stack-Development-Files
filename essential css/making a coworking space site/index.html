<!doctype html> 
<html lang="en"> 
    <head>
        <meta charset="utf-8"> 
        <title>Cowork Site</title> 
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css"> 
        <link rel="icon" href="https://cdn-icons-png.magnific.com/512/16543/16543325.png" type="image/png"> 
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Fredoka:wght@300..700&amp;family=Gloria+Hallelujah&amp;family=Google+Sans+Flex:opsz,wght@6..144,1..1000&amp;family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&amp;family=Happy+Monkey&amp;family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&amp;family=Montserrat:ital,wght@0,100..900;1,100..900&amp;family=Patrick+Hand&amp;family=Roboto:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet">
    </head> 

    <body> 

        <!-- header  -->
        <header> 
            <div class="header-left"> 
                <h1>WeBarelyWork</h1> 
                <img src="images/pin.png" id="pin-icon" alt="a location pin icon" />
            </div> 
            <img src="images/burger.png" id="burger-icon" alt="hamburger menu" /> 
        </header> 

        <!-- main --> 
        <main> 
            <!-- tagline section  -->
            <section class="tag-line"> 
                <h2>The best coworking spaces for lazy devs.</h2> 
            </section> 

            <!-- image sections  --> 
            <section class="image-sections"> 
                <!-- first section  -->
                <div class="first-section"> 
                    <img src="images/hygge.jpg" class="image-tags" alt="an image of a room having space for relaxing and lounge." /> 
                    <span id="exclusive-tag">Exclusive</span> 
                    <div class="action-section"> 
                        <h3>Skiving in Scandinavia? Relax with a latte at Hygge Lounge.</h3> 
                        <button>Book</button> 
                    </div>
                </div> 
                <!-- second section  -->
                <div class="second-section"> 
                    <img src="images/sky-garden.jpg" class="image-tags" alt="an image of a place having skygardens for relaxing." /> 
                    <div class="action-section"> 
                        <h3>Bored in Barcelona? Take a siesta at the Sky Garden.</h3> 
                        <button>Book</button> 
                    </div>
                </div> 
                <!-- third section  -->
                <div class="third-section"> 
                    <img src="images/generator.jpg" class="image-tags" alt="an image of a room having sofas and chairs for relaxing." /> 
                    <div class="action-section"> 
                        <h3>Relaxing in Rio? Take some downtime at the Generator Hub.</h3> 
                        <button>Book</button> 
                    </div>
                </div>
            </section> 
            <section class="overlays"> 
                <div class="overlay-background"> 
                    <img src="images/message.png" class="overlay-icon" alt="message icon"> 
                </div>
            </section>
        </main>
    </body>

</html>
