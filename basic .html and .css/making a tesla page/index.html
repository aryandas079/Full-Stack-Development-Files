<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/tesla-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Patrick+Hand&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Patrick+Hand&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>TESLA</title>
  </head>
  <body>
    <div class="nav-bar">
      <a href="https://www.tesla.com"><img class="logo" src="assets/tesla.png" alt="tesla-logo"></a>
      <ul class="list">
        <li class="list-items">Vehicles</li>
        <li class="list-items">Energy</li>
        <li class="list-items">Charging</li>
        <li class="list-items">Discover</li>
      </ul>
      <img width="30" height="30" src="https://img.icons8.com/fluency-systems-regular/48/user-male-circle--v1.png" alt="user-male-circle--v1"/>
    </div>
    <!-- making the hero image section -->
     <div class="image-section">
      <div class="hero-text">
        <h1 id="tag">Model Y</h1>
        <h3 id="tag2">Drive Into a Sustainable Future With the EV Switch & Save Program</h3>
        <p><span id="cta"><a href="https://www.tesla.com/en_in/event/tesla-ev-switch-and-save-program" alt="get started page for Tesla Model Y">Get Started</a></span></p>
        <div class="btn">
          <button class="order-btn"><a href="https://www.tesla.com/modely/design">Order now</a></button>
          <button class="learn"><a href="https://www.tesla.com/model3">Learn More</a></button>
        </div>
        </div>
      </div>
      <div class="floating-box">
        <a href="https://www.tesla.com/en_in/drive" alt="Tesla test drive page">Schedule a Drive</a>
      </div>
  </body>
</html>
