<!doctype html> 
<html lang="en"> 
    <head>
        <title>Unit Converter</title> 
        <meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <link rel="stylesheet" href="style.css"> 
        <link rel="icon" href="https://img.icons8.com/fluency/48/filter--v2.png" type="image/png"> 
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka:wght@300..700&family=Gloria+Hallelujah&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Happy+Monkey&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Patrick+Hand&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head> 
    <body> 
        <div class="main"> 
            <div class="header">
                <h1>Metric/Imperial Unit Conversion</h1> 
                <input type="text" id="input-el"> 
                <div><button id="enterEl">Convert</button></div>
            </div> 
            <!-- sections   --> 
            <div class="section"> 
                <!-- length -->
                <div class="length"> 
                    <h3>Length (Meters/Feets)</h3> 
                    <p id="length-el">**********</p>
                </div> 
                <!-- volume  -->
                <div class="volume"> 
                    <h3>Volume (Litres/Gallons)</h3> 
                    <p id="volume-el">**********</p>
                </div> 
                <!-- mass  -->
                <div class="mass"> 
                    <h3>Mass (Kilograms/Pounds)</h3> 
                    <p id="mass-el">**********</p>
                </div>  
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
