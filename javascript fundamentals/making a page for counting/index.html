<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Counting Page</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios/50/console.png"> 
    <link rel="stylesheet" href="style.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body> 
    <div class="main"> 
        <h1>Counting Machine</h1> 
        <div class="btn">
            <button id="count" onclick="increment()">Count</button> 
            <button id="save" onclick="save()">Save</button>  
        </div> 
        <div class="counter">
            <h3 id="count-el">Count: 0</h3> 
            <h3 id="save-el">Saved: </h3> 
        </div>
    </div> 
    <script src="script.js"></script>
</body>
</html>
