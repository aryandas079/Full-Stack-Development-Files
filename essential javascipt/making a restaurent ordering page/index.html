<!doctype html> 
<html lang="en"> 
    <head> 
        <meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restora Italia</title> 
        <link rel="stylesheet" href="style.css"> 
        <link rel="icon" href="https://img.icons8.com/arcade/64/pizza.png" type="image/png"> 
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka:wght@300..700&family=Gloria+Hallelujah&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Happy+Monkey&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Patrick+Hand&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head> 
    <body> 
        <div class="container"> 
            <header> 
                <h1 style="padding: 10px;">Restora Italia</h1> 
                <p>the best snacks in your city</p>
            </header> 
            <main> 
                <section class="menu"> 
                    <ul alt="item-list-menu" class="list-menu" style="list-style: none; 
                    padding: 0px; margin: 0px;">                        
                        <!-- menu items here  --> 
                    </ul>
                </section> 
                <section class="order-list"> 
                    <ul alt="order-list" class="order-list-items" style="list-style: none; 
                    padding: 0px; margin: 0px;"> 
                    <!-- order items here  --> 
                </section> 
                <section class="total-menu"> 
                    <!-- final order section  --> 
                </section> 
            </main> 
            <footer><p style="text-align: center; margin-top: 200px;">&copyRestora Italia</p></footer> 
        </div> 
        <section class="card-details" style="display: none;"> 
            <!-- the payment popup will appear here  --> 
        </section>
        <script src="script.js" type="module"></script>
    </body>
</html>
