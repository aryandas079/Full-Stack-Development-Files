<!doctype html> 
<html lang="en"> 
    <head> 
        <meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Twimba</title> 
        <link rel="stylesheet" href="style.css"> 
        <link rel="icon" href="https://img.icons8.com/color/48/twitter--v1.png" type="image/png"> 
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
    </head> 
    <body> 
        <!-- header -->
        <header><h1>Twimba</h1></header> 

        <!-- main --> 
        <main> 
            <section class="create-post-section"> 
                <div> 
                    <label for="tweet-input"><img src="images/scrimbalogo.png" 
                    alt="profile picture of user account"/></label>
                    <textarea id="tweet-input" 
                    placeholder="What's happening?'" style="resize: none;"></textarea> 
                    <button id="tweet-submit">Tweet</button>
                </div>
            </section> 
            <section class="post-section"> 
                <!-- posts will be added here  --> 
            </section>
        </main>
        <script src="script.js" type="module"></script>
    </body>
</html>
